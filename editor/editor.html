<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>MOSSVEIL Editor</title>
<style>
  :root {
    --bg0:#1b1b1f; --bg1:#242428; --bg2:#2d2d33; --bg3:#37373e;
    --line:#121215; --txt:#cfd2d6; --txt2:#8a8e96; --acc:#4fa3ff; --warn:#ffb454;
  }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:var(--bg0); color:var(--txt);
    font:12px "Segoe UI", system-ui, sans-serif; overflow:hidden; user-select:none;
    -webkit-user-select:none; -webkit-touch-callout:none; touch-action:manipulation;
    -webkit-text-size-adjust:100%; }
  #app { display:grid; height:100%; position:relative;
    grid-template-rows: 38px 1fr 210px 24px;
    grid-template-columns: 250px 1fr 300px;
    grid-template-areas:
      "toolbar toolbar toolbar"
      "left viewport inspector"
      "left assets inspector"
      "status status status"; }
  /* draggable panel splitters (session-only, reset on reload) */
  .vsplit { position:absolute; top:38px; bottom:24px; width:8px; z-index:18;
    cursor:col-resize; touch-action:none; }
  .vsplit:hover, .vsplit.drag { background:rgba(110,200,160,0.3); }
  #vsplitL { left:246px; } #vsplitR { right:296px; }

  /* toolbar */
  #toolbar { grid-area:toolbar; background:var(--bg2); border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:6px; padding:0 10px; flex-wrap:nowrap;
    overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; }
  #toolbar > * { flex:0 0 auto; }
  #toolbar .logo { font-family:Georgia,serif; letter-spacing:2px; color:#9fd8b8; margin-right:10px; }
  .tbtn { background:var(--bg3); color:var(--txt); border:1px solid #45454d; border-radius:4px;
    padding:4px 10px; cursor:pointer; font-size:12px; }
  .tbtn:hover { background:#42424b; }
  .tbtn.on { background:var(--acc); color:#0c1014; border-color:var(--acc); }
  .tbtn.play { background:#2f7d4f; border-color:#2f7d4f; color:#eafff0; font-weight:600; }
  .tbtn.play:hover { background:#379159; }
  .tbtn.warn { border-color:var(--warn); color:var(--warn); }
  .tsel { background:var(--bg3); color:var(--txt); border:1px solid #45454d; border-radius:4px; padding:3px 4px; font-size:12px; cursor:pointer; }
  .tsep { width:1px; height:22px; background:#46464e; margin:0 4px; }
  #dirty { color:var(--warn); display:none; margin-left:4px; }
  #saveMsg { color:#7fd6a0; margin-left:4px; font-size:11px; }

  /* left panel */
  #left { grid-area:left; background:var(--bg1); border-right:1px solid var(--line);
    display:flex; flex-direction:column; min-height:0; }
  .ptabs { display:flex; background:var(--bg2); border-bottom:1px solid var(--line); }
  .ptab { padding:6px 12px; cursor:pointer; color:var(--txt2); border-right:1px solid var(--line); }
  .ptab.on { background:var(--bg1); color:var(--txt); }
  .pbody { flex:1; overflow-y:auto; min-height:0; }
  .hgroup { padding:4px 8px; color:var(--txt2); font-weight:600; text-transform:uppercase;
    font-size:10px; letter-spacing:1px; margin-top:6px; }
  .hitem { padding:3px 8px 3px 18px; cursor:pointer; white-space:nowrap; overflow:hidden;
    text-overflow:ellipsis; }
  .hitem:hover { background:var(--bg2); }
  .hitem.sel { background:#2c4663; color:#fff; }
  .lvlitem { padding:6px 10px; cursor:pointer; border-bottom:1px solid #202024; }
  .lvlitem:hover { background:var(--bg2); }
  .lvlitem.cur { background:#2c4663; }
  .lvlitem small { color:var(--txt2); display:block; }
  .lvlbtns { padding:8px; display:flex; gap:6px; flex-wrap:wrap; }
  /* cutscene timeline */
  .cstl { position:relative; overflow-x:auto; overflow-y:hidden; background:#141419;
    border:1px solid #2a2a32; border-radius:4px; margin:6px 8px; }
  .cstl .ruler { position:absolute; top:0; left:0; height:14px; border-bottom:1px solid #2a2a32; }
  .cstl .tick { position:absolute; top:0; height:100%; border-left:1px solid #26262e; color:#6a6e76; font-size:9px; padding-left:2px; }
  .cstlblk { position:absolute; height:18px; border-radius:3px; font-size:10px; color:#eaeef2;
    line-height:18px; padding:0 5px; overflow:hidden; white-space:nowrap; cursor:grab;
    box-shadow:0 1px 2px rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.15); user-select:none; }
  .cstlblk.sel { outline:2px solid #ffd887; z-index:2; }
  .cstlblk.screen { background:#2f5a86; }
  .cstlblk.actor { background:#2f7d4f; }

  /* viewport */
  #viewportWrap { grid-area:viewport; position:relative; background:#000; min-width:0; min-height:0;
    touch-action:none; -webkit-user-select:none; }
  #gl, #overlay, #mapCanvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; }
  #overlay { pointer-events:none; }
  #mapCanvas { display:none; }
  #csView { position:absolute; inset:0; display:none; background:#0e0e13; overflow:auto; padding:16px 18px; }
  #csView.on { display:block; }
  #csView .cshead { color:#9fd8b8; font-size:15px; margin:2px 0 12px; }
  #csView .cstl { min-height:120px; }
  #viewportHint { position:absolute; left:10px; bottom:8px; color:rgba(220,230,225,.45);
    font-size:11px; pointer-events:none; text-shadow:0 1px 2px #000; }
  /* in-editor playtest overlay */
  #playFrame { position:absolute; inset:0; display:none; flex-direction:column; background:#04070a; z-index:20; }
  #playFrame.on { display:flex; }
  #playBar { height:30px; display:flex; align-items:center; justify-content:space-between;
    padding:0 10px; background:var(--bg2); border-bottom:1px solid var(--line); }
  #playBar #playLabel { color:#9fd8b8; font-size:12px; }
  #playClose { background:#6b2f2f; color:#fff; border:1px solid #6b2f2f; border-radius:4px;
    padding:3px 12px; cursor:pointer; font-size:12px; }
  #playClose:hover { background:#843a3a; }
  #playIframe { flex:1; width:100%; border:0; background:#04070a; }

  /* inspector */
  #inspector { grid-area:inspector; background:var(--bg1); border-left:1px solid var(--line);
    overflow-y:auto; padding-bottom:30px; }
  #inspector h3 { margin:0; padding:8px 10px; background:var(--bg2); font-size:12px;
    border-bottom:1px solid var(--line); }
  .insBody { padding:8px 10px; }
  .frow { display:flex; align-items:center; margin-bottom:6px; gap:6px; }
  .frow label { width:92px; color:var(--txt2); flex-shrink:0; }
  .frow input[type=text], .frow input[type=number], .frow select, .frow textarea {
    flex:1; min-width:0; background:var(--bg0); color:var(--txt); border:1px solid #3c3c44;
    border-radius:3px; padding:4px 6px; font:12px "Segoe UI", sans-serif; }
  .frow textarea { height:64px; resize:vertical; }
  .frow input[type=checkbox] { transform:scale(1.1); }
  .frow input[type=color] { width:42px; height:24px; padding:0; border:1px solid #3c3c44; background:none; }
  .insNote { color:var(--txt2); font-size:11px; margin:6px 0; line-height:1.5; }
  .dangerBtn { background:#6b2f2f; border-color:#6b2f2f; }

  /* assets */
  #assets { grid-area:assets; background:var(--bg1); border-top:1px solid var(--line);
    display:flex; flex-direction:column; min-height:0; }
  #assetBody { flex:1; overflow-y:auto; padding:8px; display:flex; flex-wrap:wrap;
    gap:6px; align-content:flex-start; }
  .asset { position:relative; width:104px; height:58px; background:var(--bg2); border:1px solid #3c3c44;
    border-radius:5px; cursor:pointer; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:4px; text-align:center; padding:4px; }
  .asset:hover { background:var(--bg3); border-color:#5a5a64; }
  .asset.on { border-color:var(--acc); background:#253a52; }
  .asset .ico { font-size:17px; }
  .asset .nm { font-size:10px; color:var(--txt2); line-height:1.15; }

  /* status */
  #status { grid-area:status; background:var(--bg2); border-top:1px solid var(--line);
    display:flex; align-items:center; gap:18px; padding:0 10px; color:var(--txt2); font-size:11px; }

  /* modal */
  #modal { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none;
    align-items:center; justify-content:center; z-index:50; }
  #modalBox { background:var(--bg1); border:1px solid #4a4a52; border-radius:8px;
    padding:16px; width:330px; }
  #modalBox h3 { margin:0 0 12px; }
  #modalBtns { display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }

  /* smooth momentum scrolling for the side/bottom panels on touch */
  .pbody, #inspector, #assetBody { -webkit-overflow-scrolling:touch; touch-action:pan-y; }

  /* --- touch devices (iPad): bigger tap targets & controls --- */
  @media (pointer: coarse) {
    .tbtn { padding:8px 12px; font-size:13px; }
    .ptab { padding:9px 14px; }
    .hitem { padding:7px 8px 7px 18px; }
    .lvlitem { padding:9px 10px; }
    .asset { width:108px; height:64px; }
    .frow input[type=text], .frow input[type=number], .frow select, .frow textarea { padding:7px 8px; font-size:13px; }
    .frow input[type=checkbox] { transform:scale(1.4); }
    .frow input[type=color] { width:48px; height:30px; }
    .ptabs .ptab, .tbtn { min-height:34px; }
  }
  /* swap the status-bar hint for the input style in use */
  .hintTouch { display:none; }
  @media (pointer: coarse) {
    .hintDesktop { display:none; }
    .hintTouch { display:inline; }
  }

  /* --- narrower screens (iPad portrait / smaller): trim the side panels --- */
  @media (max-width: 1100px) {
    #app { grid-template-columns: 200px 1fr 260px; }
  }
  @media (max-width: 820px) {
    #app { grid-template-columns: 170px 1fr 220px; grid-template-rows: 44px 1fr 180px 22px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <span class="logo">MOSSVEIL EDITOR</span>
    <button class="tbtn" id="tabScene">Scene</button>
    <button class="tbtn" id="tabMap">Map</button>
    <button class="tbtn" id="tabCutscene">Cutscene</button>
    <span class="tsep"></span>
    <button class="tbtn tool" data-tool="select" title="Select / move (1)">⬚ Select</button>
    <button class="tbtn tool" data-tool="solid" title="Paint solid tiles (2)">▦ Solid</button>
    <button class="tbtn tool" data-tool="oneway" title="Paint one-way platforms (3)">▭ One-way</button>
    <button class="tbtn tool" data-tool="spike" title="Paint spikes (4)">▲ Spikes</button>
    <button class="tbtn tool" data-tool="erase" title="Erase tiles (5)">⌫ Erase</button>
    <select id="brushShape" class="tsel" title="Brush shape for tile tools">
      <option value="pencil">✏ Pencil</option>
      <option value="line">／ Line</option>
      <option value="rect">▭ Rect</option>
      <option value="fill">🪣 Fill</option>
    </select>
    <select id="brushSize" class="tsel" title="Brush size (pencil / line)">
      <option value="1">1×</option><option value="2">2×</option><option value="3">3×</option><option value="5">5×</option>
    </select>
    <select id="terrainMat" class="tsel" title="Solid terrain material"></select>
    <button class="tbtn" id="btnSmooth" title="Paint the curvy (smooth) variant — mixes freely with hard blocks">～ Curvy</button>
    <button class="tbtn" id="btnAutotile" title="Auto-tile: exposed terrain edges become smooth, buried interior stays hard — updates as you paint/erase. Shift+click = retile the whole level now.">⊞ Auto</button>
    <span class="tsep"></span>
    <button class="tbtn" id="btnSnap" title="Snap objects to half-tiles">Snap</button>
    <button class="tbtn" id="btnGizmos" title="Show object gizmos (G)">Gizmos</button>
    <button class="tbtn" id="btnScatter" title="Scatter: stamp a randomized cluster when placing decor">⁂ Scatter</button>
    <button class="tbtn" id="btnLint" title="Validate the world — broken links, missing refs, dead ends">⚠ Lint</button>
    <span class="tsep"></span>
    <button class="tbtn" id="btnUndo" title="Undo (Ctrl+Z)">↩</button>
    <button class="tbtn" id="btnRedo" title="Redo (Ctrl+Y)">↪</button>
    <span class="tsep"></span>
    <button class="tbtn" id="btnSave" title="Save all levels (Ctrl+S)">💾 Save</button>
    <button class="tbtn" id="btnSaveTarget" title="Choose where Save writes: local files or GitHub">→ …</button>
    <button class="tbtn play" id="btnPlayHere" title="Save & play this level right here in the editor">▶ Play here</button>
    <button class="tbtn" id="btnTestStart" title="Save & play from the title screen">▶ From Start</button>
    <span id="dirty">● unsaved</span>
    <span id="saveMsg"></span>
  </div>

  <div id="left">
    <div class="ptabs">
      <div class="ptab on" id="ltabH">Hierarchy</div>
      <div class="ptab" id="ltabL">Levels</div>
      <div class="ptab" id="ltabS">Scenes</div>
    </div>
    <div class="pbody" id="hierarchy"></div>
    <div class="pbody" id="levels" style="display:none"></div>
    <div class="pbody" id="scenes" style="display:none"></div>
  </div>

  <div id="viewportWrap">
    <canvas id="gl"></canvas>
    <canvas id="overlay"></canvas>
    <canvas id="mapCanvas"></canvas>
    <div id="csView"></div>
    <div id="viewportHint"></div>
    <div id="playFrame">
      <div id="playBar"><span id="playLabel">▶ Playtest</span><button id="playClose" title="Stop & close (Esc)">✕ Stop</button></div>
      <iframe id="playIframe" title="playtest"></iframe>
    </div>
  </div>

  <div id="inspector"><h3>Inspector</h3><div class="insBody" id="insBody"></div></div>

  <div id="assets">
    <div class="ptabs" id="assetTabs"></div>
    <div id="assetBody"></div>
  </div>

  <div id="status">
    <span id="stLevel"></span>
    <span id="stMouse"></span>
    <span id="stSel"></span>
    <span style="flex:1"></span>
    <span class="hintDesktop">drag empty = marquee select · Shift+click = add · Ctrl+C/V copy/paste · Ctrl+G prefab · L align · Del delete</span>
    <span class="hintTouch">one finger — place / move / paint · two fingers — pan &amp; pinch-zoom · double-tap a room to open</span>
  </div>
  <div class="vsplit" id="vsplitL" title="Drag to resize the left panel"></div>
  <div class="vsplit" id="vsplitR" title="Drag to resize the inspector"></div>
</div>

<div id="modal"><div id="modalBox"></div></div>

<script>
// Cache-buster: when served over http(s) (GitHub Pages / the local server), load editor
// code + data FRESH every visit so new deploys and your latest committed levels show up
// immediately. Editor settings (GitHub token, etc.) live in localStorage and are unaffected.
(function () {
  var bust = (location.protocol === 'file:') ? '' : '?v=' + Date.now();
  var scripts = [
    '../lib/three.min.js',
    '../data/levels.js', '../data/cutscenes.js',
    '../src/util.js', '../src/audio.js', '../src/physics.js', '../src/fx.js', '../src/post.js', '../src/lights.js', '../src/profiler.js',
    '../src/world.js', '../src/weather.js', '../src/map.js', '../src/charms.js', '../src/player.js', '../src/enemies.js',
    '../src/bosses.js', '../src/cutscene.js', 'editor.js'
  ];
  scripts.forEach(function (src) {
    var s = document.createElement('script');
    s.src = src.indexOf('../lib/') === 0 ? src : src + bust;   // keep three.js cached
    s.async = false;            // preserve execution order
    document.head.appendChild(s);
  });
})();
</script>
</body>
</html>
