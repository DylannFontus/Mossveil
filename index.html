<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>MOSSVEIL — Echoes Beneath</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<style>
  html,body{margin:0;padding:0;background:#04070a;overflow:hidden;height:100%;cursor:default;user-select:none;
    -webkit-user-select:none;-webkit-touch-callout:none;touch-action:none;-webkit-text-size-adjust:100%}
  #game{position:fixed;inset:0;display:block}
  #hud{position:fixed;inset:0;pointer-events:none}
  #err{position:fixed;inset:0;display:none;color:#cfd8dc;font:16px Georgia,serif;padding:40px;background:#04070a}
</style>
</head>
<body>
<canvas id="game"></canvas>
<canvas id="hud"></canvas>
<div id="err"></div>
<script>
// Cache-buster: when served over http(s) (e.g. GitHub Pages), load app code + data
// FRESH on every visit so a new deploy shows up immediately — no hard-refresh needed.
// Your saved progress lives in localStorage and is NOT affected by this.
// (On file:// — double-clicking — it loads normally; there's no cache problem there.)
(function () {
  var bust = (location.protocol === 'file:') ? '' : '?v=' + Date.now();
  var scripts = [
    'lib/three.min.js',
    'data/levels.js', 'data/cutscenes.js', 'data/music.js', 'data/charms.js', 'data/sfx.js', 'data/ambience.js', 'data/weather.js', 'data/biomes.js', 'data/reverb.js', 'data/fx.js', 'data/spells.js', 'data/materials.js', 'data/mixer.js', 'data/bestiary.js', 'data/enemies-lib.js', 'data/bosses.js', 'data/player.js', 'data/difficulty.js', 'data/achievements.js', 'data/quests.js', 'data/moves.js', 'data/economy.js', 'data/hud.js', 'data/theme.js', 'data/drops.js', 'data/settings.js', 'data/loadout.js', 'data/credits.js', 'data/saves.js', 'data/camera.js', 'data/poststack.js', 'data/water.js',
    'src/util.js', 'src/theme.js', 'src/input.js', 'src/audio.js', 'src/music.js', 'src/physics.js', 'src/fx.js', 'src/water.js', 'src/poststack.js', 'src/post.js', 'src/lights.js', 'src/profiler.js', 'src/eventgraph.js', 'src/replay.js', 'src/models.js', 'src/thumb.js', 'src/dialogue.js', 'src/quests.js', 'src/debug.js',
    'src/world.js', 'src/weather.js', 'src/fire.js', 'src/map.js', 'src/difficulty.js', 'src/loadout.js', 'src/charms.js', 'src/player.js', 'src/drops.js', 'src/enemies.js', 'src/bosses.js',
    'src/cutscene.js', 'src/prologue.js', 'src/spells.js', 'src/achievements.js', 'src/economy.js', 'src/hud.js', 'src/settings.js', 'src/credits.js', 'src/saves.js', 'src/camera.js', 'src/ui.js', 'src/main.js', 'src/touch.js'
  ];
  scripts.forEach(function (src) {
    var s = document.createElement('script');
    // keep the big vendored three.js cached (it never changes); bust everything else
    s.src = src.indexOf('lib/') === 0 ? src : src + bust;
    s.async = false;            // preserve execution order
    document.head.appendChild(s);
  });
})();
</script>
</body>
</html>
